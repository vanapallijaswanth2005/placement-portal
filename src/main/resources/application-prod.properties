# ===================================================================
# PRODUCTION PROFILE CONFIGURATION
# Activate by setting: SPRING_PROFILES_ACTIVE=prod
# ===================================================================

# 1. Database Schema Management (CRITICAL)
# In production, we NEVER use 'update' because it can drop tables/columns.
# 'validate' ensures the database schema matches your Java classes.
spring.jpa.hibernate.ddl-auto=validate

# 2. Cloud File Storage
# Enforce S3 storage for production so resumes aren't lost on server restarts
app.storage.provider=s3

# 3. Disable SQL Logging in Production (Performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 4. Hide detailed error messages from users
server.error.include-stacktrace=never
server.error.include-message=never
