spring.datasource.url=jdbc:mysql://localhost:3306/placement_portal
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# NOTE: Do NOT use the database root user in production. Provide DB_USERNAME and DB_PASSWORD via env/config.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_HBM2DDL:validate} # use 'validate' in prod; avoid 'update' or 'create'
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# Secrets and credentials must be provided via environment variables or external config (do NOT commit secrets)
# Provide JWT secret via environment variable JWT_SECRET
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email Configuration (use environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true