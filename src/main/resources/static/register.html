<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glass-container auth-container">
        <h2 class="gradient-text">Create Account</h2>
        <p class="subtitle">Join our platform today.</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" required placeholder="Choose a username">
            </div>
            
            <div class="input-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required placeholder="Create a password">
            </div>

            <div class="input-group">
                <label for="reg-role">I am a...</label>
                <select id="reg-role" required>
                    <option value="STUDENT">Student</option>
                    <option value="RECRUITER">Recruiter</option>
                </select>
            </div>
            
            <div id="regErrorMessage" class="error-text"></div>
            
            <button type="submit" class="btn btn-secondary w-100">Register</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
        <p class="auth-footer"><a href="index.html">← Back to Home</a></p>
    </div>

    <!-- Background elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-3"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
