# Development profile — safe defaults for local development only.
# DO NOT USE IN PRODUCTION. Replace secrets before deploying.

spring.datasource.url=jdbc:mysql://localhost:3306/placement_portal
spring.datasource.username=root
spring.datasource.password=Jaswanth@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# Dev JWT secret (>=32 bytes). Replace with secure secret for other environments.
