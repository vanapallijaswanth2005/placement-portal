spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placement_portal}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false

# Database Schema Management (Development Only)
# 'update' is great for local dev, but dangerous in production!
# For production deployment, set SPRING_PROFILES_ACTIVE=prod to use application-prod.properties
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

# File Upload Limits (Security)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Security (override JWT_SECRET in .env for production)
jwt.secret=${JWT_SECRET:dev-local-jwt-secret-key-at-least-32-chars}

# Email Configuration (optional for local dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Optional: seed an admin user on startup (set APP_SEED_ADMIN_ENABLED=true)
app.seed-admin.enabled=${APP_SEED_ADMIN_ENABLED:false}
app.seed-admin.username=${APP_SEED_ADMIN_USERNAME:admin}
app.seed-admin.password=${APP_SEED_ADMIN_PASSWORD:}
app.seed-admin.email=${APP_SEED_ADMIN_EMAIL:admin@placement.local}

# Thymeleaf: disable web view resolver (we only use it for email templates)
spring.thymeleaf.enabled=false

# File Storage Configuration (local | s3)
app.storage.provider=${STORAGE_PROVIDER:local}

# AWS S3 Configuration (required if app.storage.provider=s3)
aws.s3.bucket-name=${AWS_BUCKET_NAME:}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.region=${AWS_REGION:us-east-1}
