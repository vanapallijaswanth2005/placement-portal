<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glass-container auth-container">
        <h2 class="gradient-text">Welcome Back</h2>
        <p class="subtitle">Please login to your account.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <div id="errorMessage" class="error-text"></div>
            
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
        <p class="auth-footer"><a href="index.html">← Back to Home</a></p>
    </div>

    <!-- Background elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
